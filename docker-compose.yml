services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobradar_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jobradar}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobradar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://jobradar:jobradar_dev@db:5432/jobradar}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
      - ./crawler:/crawler
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  crawler:
    build: ./crawler
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://jobradar:jobradar_dev@db:5432/jobradar}
      CRAWLER_RATE_LIMIT: ${CRAWLER_RATE_LIMIT:-1.0}
      CRAWLER_SCHEDULE_HOUR: ${CRAWLER_SCHEDULE_HOUR:-2}
    volumes:
      - ./crawler:/app
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - crawler
    command: python scheduler.py

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
